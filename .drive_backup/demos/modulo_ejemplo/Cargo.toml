[package]
name = "modulo_ejemplo"
version = "1.0.0"
edition = "2021"
description = "Demo: Módulo dinámico de ejemplo para RyDit Engine"
license = "MIT"

[workspace]
# Este paquete es independiente del workspace principal

[lib]
name = "modulo_ejemplo"
crate-type = ["cdylib"]  # Biblioteca dinámica (.so/.dll)

[dependencies]
rydit-core = { path = "../../crates/rydit-core", version = "0.8.2" }
serde_json = "1.0"
