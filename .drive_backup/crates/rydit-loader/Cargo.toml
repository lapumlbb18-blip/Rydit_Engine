[package]
name = "rydit-loader"
version = "0.8.2"
edition = "2021"
description = "Dynamic module loader for RyDit Engine - Hot reload and plugin system"
license = "MIT"
repository = "https://github.com/lapumlbb18-blip/Rydit_Engine"
keywords = ["game-engine", "android", "rust", "plugins", "hot-reload"]
categories = ["game-development"]

[dependencies]
rydit-core = { path = "../rydit-core", version = "0.8.2" }
serde_json = "1.0"

[target.'cfg(not(target_os = "android"))'.dependencies]
libloading = "0.8"

[features]
default = []
dynamic-loading = []
