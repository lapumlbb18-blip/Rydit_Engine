[package]
name = "rydit-http"
version = "0.1.0"
edition = "2024"
description = "HTTP + WebSocket module for RyDit Engine"
license = "MIT"

[dependencies]
# HTTP client ligero y sincrónico
ureq = { version = "2.9", features = ["json"] }

# WebSocket client
tungstenite = "0.21"

# JSON
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
