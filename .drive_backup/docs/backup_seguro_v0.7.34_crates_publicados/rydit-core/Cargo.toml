[package]
name = "rydit-core"
version = "0.7.34"
edition = "2021"
description = "Core trait and registry for RyDit modules - Android game engine"
license = "MIT"
repository = "https://github.com/lapumlbb18-blip/Rydit_Engine"
homepage = "https://github.com/lapumlbb18-blip/Rydit_Engine"
documentation = "https://docs.rs/rydit-core"
readme = "../../README.md"
keywords = ["game-engine", "android", "rust", "gamedev", "termux"]
categories = ["game-development"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
