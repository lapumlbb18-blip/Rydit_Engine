name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================================
  # BUILD + TEST en Linux (Ubuntu)
  # ============================================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (SDL2 + X11 + raylib)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev libsdl2-mixer-dev \
            libasound2-dev libx11-dev libxi-dev libxrandr-dev libgl1-mesa-dev
          # raylib para linking en tests
          sudo apt-get install -y libraylib-dev 2>/dev/null || {
            # Fallback: compilar raylib desde fuente
            git clone --depth 1 --branch 5.5 https://github.com/raysan5/raylib.git /tmp/raylib
            cd /tmp/raylib/src && make PLATFORM=PLATFORM_DESKTOP && sudo make install && sudo ldconfig
          }

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check workspace (libs only)
        run: cargo check --workspace --lib --verbose

      - name: Build workspace (libs only, no demos)
        run: cargo build --workspace --lib --verbose

      - name: Run tests (lib crates — no X11 required)
        run: cargo test --workspace --lib --exclude ry-rs --exclude ry-gfx --verbose

      - name: Run tests (ry-rs binary)
        run: cargo test -p ry-rs --bin rydit-rs --verbose || echo "⚠️ ry-rs bin test skipped (requires X11 display)"

      - name: Build release
        run: cargo build --release -p ry-rs --verbose

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: rydit-rs-linux
          path: target/release/rydit-rs
          retention-days: 7

  # ============================================================================
  # BUILD en Windows (MSVC) — sin tests (requiere SDL2 dll manual)
  # ============================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install SDL2 (vcpkg)
        run: |
          vcpkg install sdl2:x64-windows sdl2-image:x64-windows sdl2-ttf:x64-windows sdl2-mixer:x64-windows

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build workspace (libs only, skip demos)
        run: cargo build --workspace --lib --verbose

  # ============================================================================
  # BUILD en macOS
  # ============================================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install SDL2 (brew)
        run: brew install sdl2 sdl2_image sdl2_ttf sdl2_mixer

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build workspace (libs only, skip demos)
        run: cargo build --workspace --lib --verbose

  # ============================================================================
  # RELEASE: Crear artifacts (solo en tag/release)
  # ============================================================================
  release:
    needs: [build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev libsdl2-mixer-dev

      - name: Build release binaries
        run: |
          cargo build --release -p ry-rs

      - name: Create release archive
        run: |
          mkdir -p ry-dit-${{ github.event.release.tag_name }}
          cp target/release/rydit-rs ry-dit-${{ github.event.release.tag_name }}/
          cp README.md ry-dit-${{ github.event.release.tag_name }}/ 2>/dev/null || true
          cp LICENSE ry-dit-${{ github.event.release.tag_name }}/ 2>/dev/null || true
          tar czf ry-dit-${{ github.event.release.tag_name }}-linux-x86_64.tar.gz ry-dit-${{ github.event.release.tag_name }}/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ry-dit-${{ github.event.release.tag_name }}-linux-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # CRATES.IO: Publicar crates automáticamente (solo en release)
  # ============================================================================
  publish-crates:
    needs: [build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev libsdl2-mixer-dev

      - name: Publish v-shield
        run: cargo publish -p v-shield --token ${{ secrets.CRATES_TOKEN }} || true

      - name: Publish ry-stream
        run: cargo publish -p ry-stream --token ${{ secrets.CRATES_TOKEN }} || true

      - name: Publish ry-backend
        run: cargo publish -p ry-backend --token ${{ secrets.CRATES_TOKEN }} || true

      - name: Publish migui
        run: cargo publish -p migui --token ${{ secrets.CRATES_TOKEN }} || true

      - name: Publish ry-gfx
        run: cargo publish -p ry-gfx --token ${{ secrets.CRATES_TOKEN }} || true
