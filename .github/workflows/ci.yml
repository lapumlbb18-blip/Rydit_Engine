name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install system dependencies (raylib)
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libx11-dev libxi-dev libxrandr-dev libgl1-mesa-dev

    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build
      run: cargo build --verbose

    - name: Run tests (core crates only - graphics require X11)
      run: |
        cargo test -p lizer --verbose
        cargo test -p blast-core --verbose
        cargo test -p v-shield --verbose
        cargo test -p migui --verbose
        cargo test -p rydit-rs --verbose

    - name: Build release
      run: cargo build --release --verbose

    - name: Upload binary artifact
      uses: actions/upload-artifact@v3
      with:
        name: rydit-rs-linux
        path: target/release/rydit-rs
        retention-days: 7
